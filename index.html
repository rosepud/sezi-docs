<title>Sezi - Yasal Belgeler</title>
<style>
  :root { --bg:#130728; --card:#1A0D32; --text:#E8E4F3; --muted:#9B7EDE; --accent:#00D9FF; --gold:#FFD700; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:linear-gradient(180deg,#130728 0%,#1A0D32 100%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; line-height:1.6; min-height:100vh; padding:40px 24px; }
  .container { max-width:640px; margin:0 auto; }
  .logo { text-align:center; font-size:48px; color:var(--accent); margin-bottom:8px; letter-spacing:2px; font-weight:300; }
  .tagline { text-align:center; color:var(--muted); margin-bottom:48px; font-size:14px; }
  h1 { color:var(--text); font-size:22px; margin-bottom:24px; text-align:center; }
  .links { display:flex; flex-direction:column; gap:12px; }
  .link { display:flex; align-items:center; justify-content:space-between; background:var(--card); padding:18px 22px; border-radius:12px; text-decoration:none; color:var(--text); border:1px solid rgba(155,126,222,.15); transition:all .2s; }
  .link:hover { border-color:var(--accent); transform:translateY(-2px); }
  .link-title { font-weight:500; }
  .arrow { color:var(--muted); }
  .footer { text-align:center; color:var(--muted); font-size:13px; margin-top:48px; }
  .footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
